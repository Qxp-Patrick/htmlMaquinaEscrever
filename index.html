<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Efeito Datilografia</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #FFF4ECCF;
    color: #000000;
    font-family: "Courier New", monospace;
}

#texto {
    font-size: 1rem;
    color: #000;
    border-right: 2px solid #000;
    padding-right: 3px;
    max-width: 80%;
    text-align: center;
    white-space: pre-wrap;
    word-break: break-word;
    animation: piscar 0.7s infinite;
}

    /* Cursor piscando */
    @keyframes piscar {
        50% {
            border-color: transparent;
        }
    }

    #texto {
        animation: piscar 0.7s infinite;
    }
</style>
</head>
<body>

<div id="texto"></div>

<script>
    // Escreva sua frase aqui
    const frase = "Você consegue traduzir antes de acabar o tempo? Venha para Modo Rápido.";

    const elemento = document.getElementById("texto");
    let indice = 0;

    function digitar() {
        if (indice < frase.length) {
            elemento.textContent += frase.charAt(indice);
            indice++;
            setTimeout(digitar, 80); // velocidade da digitação
        }
    }

    digitar();
</script>

</body>
</html>
